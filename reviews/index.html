    function makeCard(r) {

                        r.type.toLowerCase().includes('tournament') ? 'Tournament' :
                        r.type.toLowerCase().includes('pr') ? 'PR' : 'Boost';
      let info = `<strong>${r.detail}</strong>`;
      if (r.mode) info += ` &bull; ${r.mode}`;
      if (r.method) info += ` &bull; ${r.method}`;
      return `
        <div class="review-card">
          <div class="review-header">
            <span class="review-user">${r.user}</span>
            <span class="review-stars">★★★★★</span>
          </div>
          <div class="review-type">${r.game} &bull; ${typeClass}</div>
          <div class="review-detail">${info}</div>
          <div class="review-date">Completed ${r.date}, 2026</div>
        </div>
      `;
    }
